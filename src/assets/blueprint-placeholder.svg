<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Blueprint background -->
  <rect width="200" height="200" fill="#f1f5f9"/>

  <!-- Grid pattern -->
  <rect width="200" height="200" fill="url(#grid)"/>

  <!-- Dimension lines (left side) -->
  <line x1="10" y1="30" x2="10" y2="170" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="5" y1="30" x2="15" y2="30" stroke="#94a3b8" stroke-width="1"/>
  <line x1="5" y1="170" x2="15" y2="170" stroke="#94a3b8" stroke-width="1"/>

  <!-- Dimension lines (top) -->
  <line x1="30" y1="10" x2="170" y2="10" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="30" y1="5" x2="30" y2="15" stroke="#94a3b8" stroke-width="1"/>
  <line x1="170" y1="5" x2="170" y2="15" stroke="#94a3b8" stroke-width="1"/>

  <!-- Center circle node -->
  <circle cx="100" cy="100" r="4" fill="#4f46e5" stroke="#1e293b" stroke-width="1"/>

  <!-- Connection nodes -->
  <circle cx="60" cy="60" r="2.5" fill="#4f46e5"/>
  <circle cx="140" cy="60" r="2.5" fill="#4f46e5"/>
  <circle cx="60" cy="140" r="2.5" fill="#4f46e5"/>
  <circle cx="140" cy="140" r="2.5" fill="#4f46e5"/>

  <!-- Connection lines (circuit style) -->
  <path d="M 60 60 L 100 60 L 100 100 L 60 100" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 140 60 L 100 60 L 100 100 L 140 100" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 60 140 L 100 140 L 100 100" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 140 140 L 100 140 L 100 100" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text label -->
  <text x="100" y="190" font-family="'Fira Code', monospace" font-size="10" font-weight="bold" text-anchor="middle" fill="#64748b" opacity="0.6">PRODUCT</text>
</svg>
